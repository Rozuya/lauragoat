    <style>
        body { 
            background-color: #0e0e10; 
            color: #fff; 
            display: flex;

            height: 100vh; 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
        }
        .btn-surprise { 
            font-size: 2.2rem; 
            color: #9146FF; 
            text-decoration: none;
